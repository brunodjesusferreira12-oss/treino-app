<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fortynex Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(190, 242, 100, 0.12), transparent 28%),
          linear-gradient(180deg, #0a0b0e 0%, #07080a 100%);
        color: #f4f4f5;
        font-family: system-ui, sans-serif;
      }

      main {
        width: min(92vw, 520px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.04);
        padding: 32px;
        text-align: center;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #d4d4d8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Fortynex offline</h1>
      <p>
        Sem conexao no momento. Assim que a internet voltar, reabra o app para
        continuar seu treino, consultar o historico e sincronizar os dados.
      </p>
    </main>
  </body>
  </html>
